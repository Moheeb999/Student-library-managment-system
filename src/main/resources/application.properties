spring.application.name=student-library-managment

server.port=7878

# MySQL Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/student_library_managment
spring.datasource.username=root
spring.datasource.password=root1234
# Note: Spring Boot 3+ uses com.mysql.cj.jdbc.Driver by default
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
# Options: none, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update
# Prints SQL queries to the console for debugging
spring.jpa.show-sql=true
# Formats SQL for better readability
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Dialect (Modern versions usually auto-detect this)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
